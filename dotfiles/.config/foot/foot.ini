[main]
term=xterm-256color
font=JetBrains Mono:size=10.5
dpi-aware=yes
pad=8x8

[colors]
background=0f0f23
foreground=e0e0ff
regular0=1a1a2e    # black
regular1=e94560    # red
regular2=0ead69    # green
regular3=ffbe0b    # yellow
regular4=3a86ff    # blue
regular5=8338ec    # magenta
regular6=00b4d8    # cyan
regular7=e0e0ff    # white
bright0=44446a     # bright black
bright1=ff6b81     # bright red
bright2=55efc4     # bright green
bright3=ffd93d     # bright yellow
bright4=74b9ff     # bright blue
bright5=a29bfe     # bright magenta
bright6=48dbfb     # bright cyan
bright7=ffffff     # bright white

[csd]
preferred=none

[mouse]
hide-when-typing=yes
