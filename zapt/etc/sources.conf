# zapt sources configuration
# Format:
#   alpine://mirror/path/repo
#   debian://mirror/distribution component
#   ppa:user/repo
#   flatpak://auto

# Alpine repos (default)
alpine://dl-cdn.alpinelinux.org/alpine/edge/main
alpine://dl-cdn.alpinelinux.org/alpine/edge/community
alpine://dl-cdn.alpinelinux.org/alpine/edge/testing

# Debian pools (uncomment to enable)
# debian://deb.debian.org/debian stable main
# debian://deb.debian.org/debian unstable main

# Ubuntu PPA (uncomment to enable)
# ppa:mozillateam/ppa

# Flatpak (auto-detected if flatpak installed)
flatpak://auto
