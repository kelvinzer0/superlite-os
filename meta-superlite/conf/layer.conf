# ============================================================================
# SuperLite OS — Yocto Layer Configuration
# Layer: meta-superlite
# ============================================================================

# We have a conf and classes directory, append to BBPATH
BBPATH .= ":${LAYERDIR}"

# Let BitBake know where to find recipe files
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-superlite"
BBFILE_PATTERN_meta-superlite = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-superlite = "10"

# Layer dependencies — only require layers that actually exist
LAYERDEPENDS_meta-superlite = "core openembedded-layer"
LAYERSERIES_COMPAT_meta-superlite = "scarthgap"

# This layer provides distro, machine, and image recipes
HOSTTOOLS += "mksquashfs xorriso mcopy mkfs.vfat"
