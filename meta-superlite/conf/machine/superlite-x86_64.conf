# ============================================================================
# SuperLite OS — Machine Configuration
# Target: x86_64 live USB / ISO with LabWC Wayland desktop
# ============================================================================

#@TYPE: Machine
#@NAME: superlite-x86_64
#@DESCRIPTION: SuperLite OS x86_64 target — Alpine-based live desktop

require conf/machine/include/x86/tune-core2.inc

# Architecture
MACHINE_FEATURES = "pcbios efi screen keyboard usbhost wifi bluetooth pci"

# Kernel — use our custom linux-superlite recipe
PREFERRED_PROVIDER_virtual/kernel = "linux-superlite"
PREFERRED_VERSION_linux-superlite = "6.12%"
KERNEL_IMAGETYPE = "bzImage"

# Bootloader — GRUB for UEFI + syslinux for Legacy BIOS
PREFERRED_PROVIDER_virtual/bootloader = "grub-efi"
GRUB_PLATFORM = "efi"

# Root filesystem — squashfs for live boot
IMAGE_FSTYPES = "squashfs-xz wic"
WKS_FILE = "superlite-live.wks"

# Serial console
SERIAL_CONSOLES = "115200;ttyS0"

# Mesa for Wayland (Gallium + LLVM)
PACKAGECONFIG:append:pn-mesa = " gallium gallium-llvm egl gbm"

# Preferred providers for desktop components
PREFERRED_PROVIDER_virtual/wayland-compositor = "labwc"

# Size constraints — aim for <500MB ISO
IMAGE_ROOTFS_EXTRA_SPACE = "0"
IMAGE_OVERHEAD_FACTOR = "1.0"
