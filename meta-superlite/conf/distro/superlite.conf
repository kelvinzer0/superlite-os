# ============================================================================
# SuperLite OS — Distro Configuration
# Minimal, musl-compatible, live-boot oriented
# ============================================================================

DISTRO = "superlite"
DISTRO_NAME = "SuperLite OS"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "spark"

# Init system
DISTRO_FEATURES = "wayland opengl pam bluetooth wifi pci usbhost x11-vulkan-anv"
DISTRO_FEATURES:remove = "x11"

# Package manager
PACKAGE_CLASSES = "package_ipk"

# Version reporting
DISTRO_VERSION[vardepsexclude] = "DATE"
SDK_VENDOR = "-superlitesdk"
SDK_VERSION := "${@'${DISTRO_VERSION}'.replace('snapshot-${DATE}', 'snapshot')}"

# Optimization — size over speed for live USB target
DISTRO_OPTIMIZATION = "-Os"

# QA checks
WARN_QA:remove = "missing-update-alternatives"

# License
LICENSE_FLAGS_ACCEPTED += "commercial"
