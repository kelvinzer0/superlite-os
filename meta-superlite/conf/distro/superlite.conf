# ============================================================================
# SuperLite OS — Distro Configuration
# Minimal, musl-compatible, live-boot oriented
# ============================================================================

DISTRO = "superlite"
DISTRO_NAME = "SuperLite OS"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "spark"

# Target libc — musl for minimal footprint (like Alpine)
# NOTE: If using Poky/OE-Core as base, override to musl
# TCLIBC = "musl"

# Init system — sysvinit (OpenRC compatible via busybox)
# For Alpine-style: use sysvinit with busybox init
DISTRO_FEATURES = "wayland pam bluetooth wifi pci usbhost x11-vulkan-anv"
DISTRO_FEATURES:remove = "x11"

# Package manager — keep ipk for Yocto, but target apk in final image
# The ISO build step handles apk/Alpine-specific packaging
PACKAGE_CLASSES = "package_ipk"

# Version reporting
DISTRO_VERSION[vardepsexclude] = "DATE"
SDK_VENDOR = "-superlitesdk"
SDK_VERSION := "${@'${DISTRO_VERSION}'.replace('snapshot-${DATE}', 'snapshot')}"

# Optimization — size over speed for live USB target
DISTRO_OPTIMIZATION = "-Os"

# QA checks
WARN_QA:remove = "missing-update-alternatives"
ERROR_QA:append = " missing-update-alternatives"

# License
LICENSE_FLAGS_ACCEPTED += "commercial"
