# SuperLite OS — WiFi kernel config

# ── WiFi stack ──
CONFIG_WIRELESS=y
CONFIG_CFG80211=y
CONFIG_MAC80211=y
CONFIG_MAC80211_MESH=y
CONFIG_WLAN=y

# ── Intel WiFi ──
CONFIG_IWLWIFI=y
CONFIG_IWLDVM=y
CONFIG_IWLMVM=y

# ── Qualcomm/Atheros ──
CONFIG_ATH10K=y
CONFIG_ATH10K_PCI=y
CONFIG_ATH10K_USB=y
CONFIG_ATH9K=y
CONFIG_ATH9K_HTC=y

# ── Realtek WiFi ──
CONFIG_RTL8XXXU=y
CONFIG_RTW88=y
CONFIG_RTW89=y
CONFIG_RTLWIFI=y
CONFIG_RTLWIFI_USB=y

# ── Broadcom WiFi ──
CONFIG_BRCMFMAC=y
CONFIG_BRCMFMAC_USB=y

# ── MediaTek ──
CONFIG_MT76=y
CONFIG_MT76_USB=y
