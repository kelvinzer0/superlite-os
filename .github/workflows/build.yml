name: Build SuperLite OS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Build ISO in Docker
        run: |
          chmod +x ./build.sh
          ./build.sh --docker --tag "${GITHUB_SHA::8}"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: superlite-os-iso
          path: output/*.iso
          retention-days: 14

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.iso
          generate_release_notes: true
