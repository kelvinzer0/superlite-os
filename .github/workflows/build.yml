name: Build SuperLite OS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools xorriso mtools dosfstools \
            wget ca-certificates syslinux syslinux-utils xz-utils cpio

      - name: Build ISO
        run: sudo ./build.sh --verbose

      - name: Validate build output
        run: |
          chmod +x ./tests/validate-build.sh
          ./tests/validate-build.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: superlite-os-iso
          path: superlite-os-*.iso
          retention-days: 14

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: superlite-os-*.iso
          generate_release_notes: true
