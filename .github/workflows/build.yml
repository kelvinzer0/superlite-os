name: Build SuperLite OS ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools xorriso mtools dosfstools \
            wget ca-certificates syslinux syslinux-utils xz-utils cpio

      - name: Build ISO
        run: sudo ./build.sh --verbose

      - name: Test ISO
        run: ./tests/test-build.sh

      - name: Test ISO with QEMU
        run: |
          sudo apt-get install -y qemu-system-x86 qemu-utils
          qemu-img create -f qcow2 testdisk.qcow2 2G
          # Extract kernel + initrd from ISO for direct boot
          ISO_FILE=$(ls superlite-os-*.iso | head -1)
          ISO_MNT=$(mktemp -d)
          sudo mount -o loop,ro "$ISO_FILE" "$ISO_MNT"
          cp "$ISO_MNT/boot/vmlinuz-lts" ./vmlinuz-lts
          cp "$ISO_MNT/boot/initramfs-lts" ./initramfs-lts
          sudo umount "$ISO_MNT"
          # Boot with -kernel + -initrd + -append (required for serial console in CI)
          timeout 120s qemu-system-x86_64 \
            -kernel ./vmlinuz-lts \
            -initrd ./initramfs-lts \
            -append "console=ttyS0 boot=live quiet splash loglevel=3" \
            -drive file=testdisk.qcow2,format=qcow2 \
            -m 2G \
            -cpu host \
            -machine accel=kvm \
            -nographic \
            -serial mon:stdio \
            -cdrom "$ISO_FILE" \
            | tee boot.log || true
          # Cek apakah boot berhasil sampai login prompt
          if ! grep -q "login:" boot.log && ! grep -q "superlite" boot.log; then
            echo "Kernel panic or boot failed! Showing last 50 lines:"
            tail -50 boot.log
            exit 1
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: superlite-os-iso
          path: superlite-os-*.iso
          retention-days: 14

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: superlite-os-*.iso
          generate_release_notes: true
