name: Build SuperLite OS ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools xorriso mtools dosfstools \
            wget ca-certificates syslinux syslinux-utils xz-utils cpio

      - name: Build ISO
        run: sudo ./build.sh --verbose

      - name: Test ISO
        run: ./tests/test-build.sh

      - name: Test ISO with QEMU
        run: |
          sudo apt-get install -y qemu-system-x86 qemu-utils
          qemu-img create -f qcow2 testdisk.qcow2 2G
          ISO_FILE=$(ls superlite-os-*.iso | head -1)
          # Boot from ISO via bootloader (serial console configured in GRUB/syslinux)
          # Use accel=tcg — KVM not available in CI runners
          # -serial stdio captures bootloader + kernel serial output
          timeout 300s sudo qemu-system-x86_64 \
            -cdrom "$ISO_FILE" \
            -drive file=testdisk.qcow2,format=qcow2 \
            -m 2G \
            -machine accel=tcg \
            -nographic \
            -serial mon:stdio \
            -no-reboot \
            -boot d \
            | tee boot.log || true
          # Check if boot reached login prompt
          if ! grep -q "login:" boot.log && ! grep -q "superlite" boot.log && ! grep -q "SuperLite" boot.log; then
            echo "Kernel panic or boot failed! Showing last 50 lines:"
            tail -50 boot.log
            exit 1
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: superlite-os-iso
          path: superlite-os-*.iso
          retention-days: 14

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: superlite-os-*.iso
          generate_release_notes: true
