name: Build SuperLite OS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools xorriso mtools dosfstools \
            wget ca-certificates syslinux syslinux-utils xz-utils cpio

      - name: Build ISO
        run: sudo ./build.sh --verbose

      - name: Pre-build integrity check
        run: |
          # Extract rootfs from squashfs in the built ISO for validation
          ISO_FILE=$(ls superlite-os-*.iso | head -1)
          EXTRACT_DIR="/tmp/rootfs-check"
          sudo mkdir -p "$EXTRACT_DIR"

          # Mount the ISO and extract squashfs
          ISO_MNT="/tmp/iso-mnt"
          sudo mkdir -p "$ISO_MNT"
          sudo mount -o loop "$ISO_FILE" "$ISO_MNT" 2>/dev/null || true

          if [[ -f "$ISO_MNT/live/rootfs.squashfs" ]]; then
            # Extract squashfs to temp dir for checking
            sudo unsquashfs -f -d "$EXTRACT_DIR" "$ISO_MNT/live/rootfs.squashfs" 2>&1 | tail -3
            sudo umount "$ISO_MNT" 2>/dev/null || true

            # Run the pre-build integrity check
            chmod +x ./tests/pre-build-check.sh
            sudo ./tests/pre-build-check.sh "$EXTRACT_DIR"

            # Cleanup
            sudo rm -rf "$EXTRACT_DIR"
          else
            echo "WARNING: Could not find rootfs.squashfs in ISO"
            sudo umount "$ISO_MNT" 2>/dev/null || true
            # Fall back to checking the build rootfs directly
            if [[ -d "./build/rootfs" ]]; then
              chmod +x ./tests/pre-build-check.sh
              sudo ./tests/pre-build-check.sh "./build/rootfs"
            fi
          fi

      - name: Test ISO basic structure
        run: ./tests/test-build.sh

      - name: Test ISO with QEMU (boot + desktop environment)
        run: |
          sudo apt-get install -y qemu-system-x86 qemu-utils
          chmod +x ./tests/test-qemu-de.sh
          ./tests/test-qemu-de.sh

      - name: Upload boot log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: /tmp/superlite-boot-de.log
          retention-days: 7

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: superlite-os-iso
          path: superlite-os-*.iso
          retention-days: 14

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: superlite-os-*.iso
          generate_release_notes: true
