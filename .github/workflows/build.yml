name: Build SuperLite OS ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools xorriso mtools dosfstools \
            wget ca-certificates syslinux syslinux-utils xz-utils cpio

      - name: Build ISO
        run: sudo ./build.sh --verbose

      - name: Test ISO
        run: ./tests/test-build.sh

      - name: Test ISO with QEMU
        run: |
          sudo apt-get install -y qemu-system-x86 qemu-utils
          qemu-img create -f qcow2 testdisk.qcow2 2G
          ISO_FILE=$(ls superlite-os-*.iso | head -1)
          # Boot from ISO via bootloader (serial console configured in GRUB/syslinux)
          # Use accel=tcg — KVM not available in CI runners
          # -serial stdio captures bootloader + kernel serial output
          timeout 180s sudo qemu-system-x86_64 \
            -cdrom "$ISO_FILE" \
            -drive file=testdisk.qcow2,format=qcow2 \
            -m 2G \
            -machine accel=tcg \
            -nographic \
            -serial mon:stdio \
            -no-reboot \
            -boot d \
            2>&1 | tee boot.log || true
          echo "=== Boot log (last 80 lines) ==="
          tail -80 boot.log
          # Check for kernel panic or boot failure
          if grep -q "Kernel panic" boot.log; then
            echo "FAILED: Kernel panic detected"
            exit 1
          fi
          # Check for signs of successful boot (any of these is good)
          if grep -qi "login:" boot.log || grep -qi "superlite" boot.log || \
             grep -qi "Welcome" boot.log || grep -qi "Alpine" boot.log || \
             grep -qi "initramfs" boot.log || grep -qi "\[live\]" boot.log; then
            echo "SUCCESS: Boot reached userspace or live init"
            exit 0
          fi
          echo "FAILED: No sign of successful boot"
          exit 1

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: superlite-os-iso
          path: superlite-os-*.iso
          retention-days: 14

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: superlite-os-*.iso
          generate_release_notes: true
