name: Build SuperLite OS ISO

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'ISO variant to build'
        required: false
        default: 'superlite-unified'
        type: choice
        options:
          - superlite-unified
          - superlite
          - superlite-install
          - superlite-parted

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Build ISO in Docker
        run: |
          VARIANT="${{ github.event.inputs.variant || 'superlite-unified' }}"
          chmod +x ./build.sh
          ./build.sh --docker --variant "$VARIANT" --tag "${GITHUB_SHA::8}"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: superlite-os-iso
          path: output/**/*.iso
          retention-days: 14

      - name: QEMU Smoke Test
        run: |
          ISO=$(find output -name "*.iso" -type f | head -1)
          echo "Testing ISO: $ISO"

          # Install QEMU + expect
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils ovmf expect >/dev/null

          # Write expect script for interactive boot test
          cat > /tmp/qemu-test.exp << 'EXPECT_SCRIPT'
          #!/usr/bin/expect -f
          set timeout 180

          # Start QEMU
          spawn qemu-system-x86_64 \
            -m 4096 \
            -nographic \
            -no-reboot \
            -cdrom $env(ISO_PATH) \
            -boot d \
            -serial mon:stdio

          # Wait for login prompt (auto-login will kick in)
          expect {
            -re "login:" {
              sleep 1
              send "\r"
            }
            "Kernel panic" {
              puts "\n✗ FAIL: Kernel panic detected"
              exit 1
            }
            timeout {
              puts "\n✗ FAIL: Boot timeout (180s)"
              exit 1
            }
          }

          # After auto-login, unified ISO shows boot menu or shell
          # Handle both: menu (choose 4=shell) or direct shell
          expect {
            -re {Choose [1-4]:} {
              puts "\n  Boot menu detected — selecting Shell (4)"
              send "4\r"
            }
            -re {(localhost|superlite|alpine)[^#]*# } {
              puts "\n  Direct shell prompt (legacy ISO or desktop mode)"
            }
            timeout {
              puts "\n✗ FAIL: No menu or shell after login"
              exit 1
            }
          }

          # Wait for root shell prompt
          expect {
            -re {(localhost|superlite|alpine)[^#]*# } {
              puts "\n✓ Shell ready — root auto-login successful"
            }
            timeout {
              puts "\n✗ FAIL: No shell prompt"
              exit 1
            }
          }

          # ── Diagnostic Commands ─────────────────────────────
          proc run_check {cmd desc} {
            send "$cmd\r"
            expect -re {(localhost|superlite|alpine)[^#]*# }
            puts "  ✓ $desc"
          }

          puts "\n=== Running Diagnostics ==="

          run_check "uname -a" "Kernel version"
          run_check "rc-status --no-color 2>&1 | head -30" "Service status"
          run_check "rc-status --no-color 2>&1 | grep -i crashed || echo 'No crashed services'" "Crashed services check"
          run_check "df -h 2>&1 | head -10" "Disk usage"
          run_check "apk info --no-color 2>&1 | grep -cE '(labwc|seatd|dbus|foot|waybar|parted|partman)'" "Key packages installed"
          run_check "rc-service seatd status 2>&1 || true" "seatd status"
          run_check "rc-service dbus status 2>&1 || true" "dbus status"
          run_check "test -f /root/.profile && echo 'profile: OK' || echo 'profile: MISSING'" "Root profile exists"
          run_check "test -f /usr/local/bin/partman && echo 'partman: OK' || echo 'partman: MISSING'" "Partition manager"
          run_check "test -f /usr/local/bin/superlite-installer && echo 'installer: OK' || echo 'installer: MISSING'" "Installer"
          run_check "test -f /usr/local/bin/superlite-menu && echo 'menu: OK' || echo 'menu: MISSING'" "Boot menu"
          run_check "test -f /etc/profile.d/00-boot-mode.sh && echo 'boot-mode: OK' || echo 'boot-mode: MISSING'" "Boot mode script"
          run_check "grep -q 'superlite.mode' /etc/profile.d/00-boot-mode.sh && echo 'mode detection: OK' || echo 'mode detection: MISSING'" "Mode detection"
          run_check "dmesg 2>&1 | grep -iE '(panic|oops|bug:|error)' | grep -iv 'warning' | head -5 || echo 'dmesg: clean'" "dmesg critical errors"
          run_check "which labwc 2>&1 && labwc --version 2>&1 || echo 'labwc: NOT FOUND'" "LabWC binary"
          run_check "ip link show 2>&1 | head -10" "Network interfaces"

          puts "\n=== All Checks Passed ==="

          # Graceful shutdown
          send "poweroff\r"
          expect eof

          puts "\n✓ QEMU smoke test PASSED"
          exit 0
          EXPECT_SCRIPT

          chmod +x /tmp/qemu-test.exp

          # Run the test
          export ISO_PATH="$ISO"
          echo "Booting ISO in QEMU (expect-based interactive test)..."
          if expect /tmp/qemu-test.exp 2>&1 | tee /tmp/qemu-boot.log; then
            echo ""
            echo "✓ QEMU smoke test PASSED"
          else
            echo ""
            echo "=== Boot Log (last 50 lines) ==="
            tail -50 /tmp/qemu-boot.log
            echo "================================="
            echo ""
            echo "✗ QEMU smoke test FAILED"
            exit 1
          fi

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/**/*.iso
          generate_release_notes: true
